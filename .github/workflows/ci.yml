name: CI

# First defense against silent regressions. Two jobs:
#   1. ci — lint + typecheck + unit tests (no secrets, works for fork PRs).
#   2. audit-permissions — permission drift check against staging DB
#      (skipped on fork PRs where DATABASE_URL secret isn't available).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref — saves minutes and stops the queue
# from filling up when someone force-pushes a branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint • typecheck • test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Lint runs first — cheapest signal, surfaces unused imports and
      # unsafe patterns before the heavier typecheck loads the world.
      - name: Lint
        run: npm run lint -- --max-warnings=0
        continue-on-error: false

      # Typecheck without emit — catches the kind of constraint and type
      # mismatches that used to land as bodyless 500s in dev.
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      # Glob-discovered unit tests. Drop any new *.test.ts under src/ and
      # it runs automatically — no need to register it in package.json.
      - name: Unit tests
        run: node --test --import tsx --test-reporter spec 'src/**/*.test.ts'

      # Dead-code ratchet (knip). Fails ONLY on findings that are NOT already
      # in knip-baseline.json — the committed snapshot of the existing backlog
      # (~2.3k known unused files/exports/types/deps). The baseline absorbs the
      # legacy noise so this is green today; a PR that introduces NEW dead code
      # (an orphaned file, an unused export/dep) trips the gate.
      # Fix: remove the dead code / wire it up, or — if the finding is
      # intentional and reviewed — run `npm run knip:baseline` and commit the
      # refreshed knip-baseline.json. See docs/DEAD_CODE_CLEANUP_PLAN.md.
      - name: Dead-code gate (knip baseline)
        run: npm run knip

      # Phase 2f: the committed route-permission manifest must match the
      # live route source. If a PR changes a route's auth gate without
      # regenerating the manifest, this fails with a human-readable diff.
      # Fix: `npm run audit-route-auth:emit` and commit the result.
      - name: Route-permission manifest drift
        run: npm run audit-route-auth:check

      # Hard ratchet (no DB): fail the build for ANY route that exports a verb
      # with no auth gate and no documented exemption. Unlike the drift check
      # above, this can't be silenced by re-emitting the manifest — the only fix
      # is a real gate (withAuth/requireRoutePerm) or a classifyExemption entry.
      # Stops the "forgot the guard → unauthenticated + cross-tenant" class
      # (e.g. the bin-utilization regression) from coming back.
      - name: Route auth enforce (no ungated routes)
        run: npm run audit-route-auth:enforce

      # Tenancy isolation static gate (A) — ADVISORY (continue-on-error).
      # Reports routes touching a FORCEd table that the route audit doesn't
      # recognize as GUC-wrapped. It currently OVER-COUNTS (~230 hits) because
      # the file-level audit can't see through helper delegation — most flagged
      # routes import the owner `pool` only for idempotency/audit and reach
      # tenant data through GUC-safe helpers (see docs/tenancy/leak-audit-2026-06-27.md).
      # So it's advisory until the route audit can follow helper calls; the
      # HARD gate is the keystone role invariant (B), run in the audit-permissions
      # job below. Promote this back to a blocking gate once (A) is precise.
      - name: Tenancy isolation guard (static, advisory)
        continue-on-error: true
        run: npm run tenancy:guard:check -- --static-only

      - name: Schema drift guard (dropped columns)
        run: npm run schema:drift-guard:check

  audit-permissions:
    name: Permission drift audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip for fork PRs where DATABASE_URL isn't available.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run permission audit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not configured — skipping live drift audit."
            exit 0
          fi
          npm run audit-permissions

      # Live tenancy invariant (B): hard-fail if the role that serves TENANT
      # traffic has BYPASSRLS while any table is FORCEd (which would make FORCE
      # inert). Post-E1 this is the app_tenant role (TENANT_APP_DATABASE_URL);
      # the owner DSN is intentionally BYPASSRLS for admin/cron paths, so the
      # guard must see the tenant DSN to check the right role. Skips cleanly if
      # the tenant secret isn't configured.
      - name: Tenancy isolation guard (live role invariant)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TENANT_APP_DATABASE_URL: ${{ secrets.TENANT_APP_DATABASE_URL }}
        run: |
          if [ -z "$TENANT_APP_DATABASE_URL" ]; then
            echo "::warning::TENANT_APP_DATABASE_URL secret not set — live tenant-role invariant skipped."
            exit 0
          fi
          npm run tenancy:guard:check -- --live-only

      # Cross-org isolation canary (Bucket 1 — "a second org sees ZERO of the
      # first's data"). HARD gate: proves the app_tenant role is non-bypass,
      # that a FORCEd scratch table isolates org A from org B, and that EVERY
      # live FORCEd table returns only the querying org's own rows. `:check`
      # fails on a broken proof (role bypass / RLS leak) but NOT on the
      # completeness gap (that's `--strict`). Needs the tenant DSN to be real
      # (else the tenant pool aliases the bypass owner and leg 1 fails), so it
      # skips cleanly when the secret isn't configured.
      - name: Tenant isolation canary (cross-org proof)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TENANT_APP_DATABASE_URL: ${{ secrets.TENANT_APP_DATABASE_URL }}
        run: |
          if [ -z "$TENANT_APP_DATABASE_URL" ]; then
            echo "::warning::TENANT_APP_DATABASE_URL secret not set — cross-org canary skipped."
            exit 0
          fi
          npm run tenancy:canary:check
