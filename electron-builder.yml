appId: com.usav.orders.desktop
productName: USAV Orders

asar: true

directories:
  output: desktop-dist

# Files to include in the packaged app.
# The Next.js build output is NOT included here — in production the app
# loads from the Vercel URL.  Only the Electron shell, local sidecar server,
# and node_modules needed at runtime are bundled.
files:
  - electron/**/*
  - server/**/*
  - node_modules/**/*
  - package.json

# Exclude heavy dev-only modules to keep the bundle lean
# (electron-builder, next, typescript, etc. are not needed at runtime)
# These are pruned automatically via asar but listing here adds clarity.
asarUnpack:
  - "node_modules/multer/**/*"
  - "node_modules/express/**/*"

# ---------------------------------------------------------------------------
# macOS — Apple Silicon only.
# The Intel (x64) DMG is built separately by `electron-builder.mac-intel-legacy.yml`
# using Electron 22 so it runs on macOS 10.13–10.15 (Electron 41 requires 11+).
# ---------------------------------------------------------------------------
mac:
  category: public.app-category.business
  # icon: public/icon.icns   # TODO: add 512×512 .icns
  minimumSystemVersion: '11.0.0'
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  title: USAV Orders ${version}
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
win:
  # icon: public/icon.ico   # TODO: add 256×256+ multi-res .ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # installerIcon: public/icon.ico
  # uninstallerIcon: public/icon.ico

# ---------------------------------------------------------------------------
# Linux (optional)
# ---------------------------------------------------------------------------
linux:
  # icon: public/icon.png   # TODO: add 512×512 .png
  target:
    - AppImage

# ---------------------------------------------------------------------------
# Auto-update via GitHub Releases
# Fill in your GitHub repo details below to enable silent auto-updates.
# ---------------------------------------------------------------------------
publish:
  provider: github
  owner: usavsolutionsinc
  repo: USAV-Orders-Backend
  releaseType: release          # only pull from published (non-draft) releases
