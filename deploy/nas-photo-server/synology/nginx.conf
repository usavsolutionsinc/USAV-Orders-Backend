# Read-only photo server for the receiving "Select from NAS" picker (PROD).
#
# Serves ONE sandboxed photos folder and exposes a JSON directory listing
# (nginx autoindex) that the browser-side picker reads via fetch(). Image bytes
# are loaded as <img> tags (by the app gallery AND by Zendesk), which are NOT
# subject to CORS — so locking CORS below only restricts who can *browse* the
# listing from a browser; it does not break image display anywhere.

# Origin allowlist for the listing fetch. Only the app's own origins may read
# the directory JSON cross-origin. Add/replace hostnames as the app domain
# changes. `map` lives in the http context (conf.d is included there).
map $http_origin $cors_ok {
    default                                       "";
    "https://usav-orders-backend.vercel.app"      $http_origin;
    # Re-add any other app origin the prod app is served from, e.g.:
    # "https://staff-backend.usavshop.com"        $http_origin;
}

server {
    listen 80;
    server_name _;

    # The ONLY path exposed. The compose mount points this at the dedicated
    # "Puchasing photos/2026" folder — a specific subfolder, never a share
    # root that also holds other business files or secrets.
    root /srv/photos;
    charset utf-8;

    # Don't let a stray index.html suppress the listing.
    index  nonexistent-on-purpose.html;

    location / {
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;

        # Read-only: only safe verbs.
        limit_except GET HEAD OPTIONS { deny all; }

        # CORS restricted to the app origin(s) above (not "*").
        add_header 'Access-Control-Allow-Origin'  $cors_ok            always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Vary'                          'Origin'            always;

        if ($request_method = OPTIONS) { return 204; }

        # Cache the actual image bytes briefly. These load as <img> (no CORS),
        # including from Zendesk, so no ACAO restriction is needed here.
        location ~* \.(jpe?g|png|webp|gif)$ {
            expires 1h;
        }
    }
}
