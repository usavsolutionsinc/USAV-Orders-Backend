# LAN-ONLY read-only photo server config (pairs with docker-compose.lan.yml).
#
# Difference from the production nginx.conf: CORS is OPEN (Access-Control-Allow-
# Origin: *) instead of locked to the app's https origin. That's appropriate
# here because:
#   • this server is never exposed to the internet (LAN only, no tunnel),
#   • it is read-only and the folder contents aren't sensitive, and
#   • on a LAN the app's origin varies per machine (localhost:3000, various LAN
#     IPs/ports), so an allowlist is impractical.
# The directory LISTING is fetched via fetch() (needs CORS); image bytes load as
# <img> (not subject to CORS) either way.

server {
    listen 80;
    server_name _;

    # The ONLY path exposed — the compose mount points this at the dedicated
    # "Puchasing photos/2026" folder, mounted read-only.
    root /srv/photos;
    charset utf-8;

    # Don't let a stray index.html suppress the listing.
    index  nonexistent-on-purpose.html;

    location / {
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;

        # Read-only: only safe verbs.
        limit_except GET HEAD OPTIONS { deny all; }

        # Open CORS for LAN use (see header note).
        add_header 'Access-Control-Allow-Origin'  '*'                 always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;

        if ($request_method = OPTIONS) { return 204; }

        location ~* \.(jpe?g|png|webp|gif)$ {
            expires 1h;
        }
    }
}
