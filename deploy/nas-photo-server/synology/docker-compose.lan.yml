# LAN-ONLY NAS photo server (no Cloudflare tunnel).
#
# Use this when every computer that needs the photos is already on the office
# network with the NAS, AND the app is opened over http on the LAN (NOT the
# https Vercel site — browsers block http images on an https page).
#
# It's the production compose minus `cloudflared`: just the nginx file server,
# reachable at http://<NAS-LAN-IP>:8088/ (e.g. http://192.168.254.14:8088/).
# No tunnel token, no Cloudflare account, nothing to expose to the internet.
#
# Deploy options:
#   • Synology Container Manager → Project → Create → paste this file. (GUI)
#   • Or over SSH on the NAS:  docker compose -f docker-compose.lan.yml up -d
#
# Then point the app at it (see notes at the bottom).
#
services:
  nas-photos:
    image: nginx:alpine
    container_name: usav-nas-photos
    restart: unless-stopped
    volumes:
      # LEFT = real path on the Synology (the "USAV Media" share). Read-only.
      # Folder is spelled "Puchasing" on disk (sic) — keep it exact.
      - "/volume1/USAV Media/Puchasing photos/2026:/srv/photos:ro"
      # LAN config = open CORS. Upload nginx.lan.conf to this path on the NAS.
      - "/volume1/docker/nas-photos/nginx.lan.conf:/etc/nginx/conf.d/default.conf:ro"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      - "8088:80"

# ── Point the app at it ──────────────────────────────────────────────────────
# In whatever env the LAN build reads (e.g. .env.local on the machine serving
# the app), set:
#   NEXT_PUBLIC_NAS_PHOTOS_BASE_URL=http://192.168.254.14:8088
# (Adjust the IP if the NAS differs. Must be http, and the app must be opened
#  over http on the LAN — not the https Vercel URL — or the browser blocks the
#  images as mixed content.)
#
# For LAN-only use you can also loosen CORS in nginx.conf: add the LAN origin(s)
# the app is served from to the `map $http_origin $cors_ok { … }` block, or
# (LAN-only, lower-stakes) allow any origin by setting the default to
# $http_origin. Leave the locked allowlist if you also use the Vercel site.
