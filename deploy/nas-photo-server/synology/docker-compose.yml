# Production NAS photo server for the "Select from NAS" picker.
# Serves /volume1/USAV Media/Puchasing photos/2026 (purchasing photos, 2026).
# Runs on the Synology DiskStation (DSM 7) via Container Manager → Projects.
#
# Two containers:
#   nas-photos  → read-only nginx file server with JSON directory listing + CORS
#   cloudflared → Cloudflare Tunnel giving a public HTTPS hostname, so the
#                 photos load from the Vercel app, remote staff, AND Zendesk.
#
# The browser (and Zendesk) talk to the tunnel; cloudflared reaches the file
# server over the private compose network at http://nas-photos:80. No router
# port-forwarding, no inbound firewall holes, free TLS.
#
# Setup: see ./RUNBOOK.md.
#
services:
  nas-photos:
    image: nginx:alpine
    container_name: usav-nas-photos
    restart: unless-stopped
    networks: [nasnet]
    volumes:
      # LEFT = real path on the Synology. This serves the purchasing photos for
      # 2026. The "USAV Media" share mounts at /volume1/USAV Media on the NAS
      # (it shows up as /Volumes/USAV Media on a Mac). Folder name is spelled
      # "Puchasing" on disk (sic) — keep it exact. Mounted READ-ONLY (:ro).
      # If your volume isn't volume1, adjust the prefix.
      - "/volume1/USAV Media/Puchasing photos/2026:/srv/photos:ro"
      - "/volume1/docker/nas-photos/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    # Defense in depth: container can't write the volume either.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      # LAN sanity-check only (http://192.168.254.14:8088/). The public path is
      # the tunnel; you can remove this mapping once verified if you want the
      # folder reachable ONLY through Cloudflare.
      - "8088:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: usav-cloudflared
    restart: unless-stopped
    networks: [nasnet]
    command: tunnel --no-autoupdate run
    environment:
      # Paste the token from Cloudflare Zero Trust → Networks → Tunnels →
      # (your tunnel) → Install connector. It starts with "eyJ...".
      # In the Container Manager Project editor you can set this here directly
      # or via the project's Environment tab.
      - TUNNEL_TOKEN=PASTE_YOUR_TUNNEL_TOKEN_HERE

networks:
  nasnet:
    driver: bridge
