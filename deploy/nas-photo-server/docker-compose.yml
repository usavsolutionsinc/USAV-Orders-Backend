# Small read-only file server for the receiving "Select from NAS" picker.
# Runs on the Ugreen NAS (UGOS Pro → Docker / Container Station). See README.md.
#
#   docker compose up -d
#
services:
  nas-photos:
    image: nginx:alpine
    container_name: usav-nas-photos
    restart: unless-stopped
    ports:
      # Host:Container. Browse http://<nas-lan-ip>:8088/ to sanity-check.
      - "8088:80"
    volumes:
      # ── The photos folder, mounted READ-ONLY (:ro) ───────────────────────
      # LEFT side = the real path ON THE NAS host (discovered via SSH on
      # Densense-1). Quoted because the path contains a space. This is the
      # Photos SUBFOLDER only — never the home root, which holds secrets.
      # For production, consider a dedicated UGOS shared folder instead of a
      # personal home folder, e.g. /volume1/ReceivingPhotos.
      - "/volume1/@home/Michael Garisek/Photos:/srv/photos:ro"
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Defense in depth: the container itself can't write the volume either.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
