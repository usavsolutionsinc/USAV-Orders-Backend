# Read-only photo server for the receiving "Select from NAS" picker.
#
# Serves a single sandboxed photos folder over HTTP and exposes a JSON
# directory listing (nginx autoindex) that the browser-side picker reads.
# The app (on Vercel) never touches these files — only the receiver's
# browser, on the office network, does. See ./README.md.

server {
    listen 80;
    server_name _;

    # IMPORTANT: this is the ONLY path exposed. Point the volume mount at the
    # photos folder, never at a share root that also holds secrets.
    root /srv/photos;
    charset utf-8;

    # Don't let a stray index.html suppress the listing.
    index  nonexistent-on-purpose.html;

    location / {
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;

        # Read-only: only safe verbs. Reject writes/deletes outright.
        limit_except GET HEAD OPTIONS { deny all; }

        # CORS — the picker runs on the app's origin (e.g. the Vercel domain)
        # and fetches this listing cross-origin. A simple GET with no
        # credentials, so "*" is sufficient and exposes nothing beyond the
        # photo filenames. Restrict to your app origin if you prefer.
        add_header 'Access-Control-Allow-Origin'  '*'            always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Vary'                          'Origin'       always;

        # Preflight (only sent if the picker ever adds custom headers).
        if ($request_method = OPTIONS) { return 204; }

        # Let phones/CDN cache the actual image bytes for a bit.
        location ~* \.(jpe?g|png|webp|gif)$ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            expires 1h;
        }
    }
}
